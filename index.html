    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #f8fafc;
      }
      /* Custom scrollbar for clinical density */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f5f9; 
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1; 
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8; 
      }

      @keyframes flash-update {
        0% { background-color: rgba(20, 184, 166, 0.1); }
        50% { background-color: rgba(20, 184, 166, 0.2); }
        100% { background-color: transparent; }
      }
      .animate-flash {
        animation: flash-update 2s ease-out;
      }
    </style>
